name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # 3.12 is the minimum the bot supports (sonolink requires 3.12+).
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check .

      - name: Byte-compile all sources
        # Compile-only: no third-party deps needed, just catches syntax/indentation errors.
        run: python -m compileall -q cogs core.py tools

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # sonolink (the music backend) requires Python 3.12+, so the test job
          # runs on 3.12. There the REAL sonolink installs from requirements.txt
          # and the conftest stub becomes a no-op, exercising the real import path.
          python-version: "3.12"

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Bootstrap config from templates
        # The templates carry every key read at module import time; the suite
        # never contacts Discord, a database, or Lavalink, so placeholder values
        # are enough.
        run: |
          cp config/bot.template.ini config/bot.ini
          cp config/tokens.template.ini config/tokens.ini

      - name: Run tests
        run: python -m pytest -q

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime + dev dependencies
        # Audit the same resolved tree the bot and its tests actually install.
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies for known vulnerabilities
        # Blocking: the dependency tree is clean today (Pillow >= 12.3.0,
        # PyNaCl >= 1.6.2 close the last advisories). If a NEW advisory lands,
        # this fails the build - bump the affected pin in requirements.txt to the
        # fix version (requirements.lock shows the fully-resolved tree), or, only
        # with a written justification, add `--ignore-vuln <ID>` to this step.
        run: pip-audit --progress-spinner off
