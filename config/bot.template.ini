[OwnerInfo]
OwnerID = YOUR_OWNER_ID
OwnerName = YOUR_OWNER_NAME

[BotInfo]
ClientID = YOUR_CLIENT_ID
DefaultPrefix = YOUR_DEFAULT_PREFIX

[Bot_Token]
Token = YOUR_BOT_TOKEN

[Database]
; Run PostgreSQL on the SAME host as the bot (recommended - no network hop, no SPOF).
;   TCP + password:                        postgresql://yasuho:PASSWORD@localhost/yasuho_db
;   Unix socket (peer auth, no password):  postgresql://yasuho@/yasuho_db
PostgreSQL = postgresql://yasuho:PASSWORD@localhost/yasuho_db

; Cogs are auto-discovered from the cogs/ folder at startup: any module or
; package exposing a setup() is loaded (including those nested in category
; folders like cogs/moderation/, cogs/community/, ...). There is no extension
; list to maintain.

; [Lavalink]
; Music backend (sonolink -> Lavalink v4). Set the server up with
