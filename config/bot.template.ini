[OwnerInfo]
OwnerID = YOUR_OWNER_ID
OwnerName = YOUR_OWNER_NAME

[BotInfo]
ClientID = YOUR_CLIENT_ID
DefaultPrefix = YOUR_DEFAULT_PREFIX

[Bot_Token]
Token = YOUR_BOT_TOKEN

[Database]
; Run PostgreSQL on the SAME host as the bot (recommended - no network hop, no SPOF).
;   TCP + password:                        postgresql://yasuho:PASSWORD@localhost/yasuho_db
;   Unix socket (peer auth, no password):  postgresql://yasuho@/yasuho_db
PostgreSQL = postgresql://yasuho:PASSWORD@localhost/yasuho_db

[Extension]
; Extensions to load on startup (full reference list - keep your real config/bot.ini in sync)
Extensions =
    cogs.admin
    cogs.errors
    cogs.events
    cogs.fun
    cogs.meta
    cogs.moderation
    cogs.twitch
    cogs.rooms
    cogs.settings
    cogs.music
    cogs.webstats
    cogs.info
    cogs.help
    cogs.reminders
    cogs.modlog
    cogs.leveling
    cogs.starboard
    cogs.welcome
    cogs.reactionroles
    cogs.afk
    cogs.utility
    cogs.automod
    cogs.blacklist
    cogs.profiles
    cogs.games
    cogs.extras
    cogs.searchweb
    cogs.avatarhistory
    cogs.anilist
    cogs.usersettings
